<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Export & Auto-Add PRO+++ Mobile Safe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
body {font-family:'JetBrains Mono',monospace;background:#121213;color:#fff;margin:0;padding:0;}
.container{max-width:900px;margin:auto;padding:15px;}
section{background:#1f2937;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.5);}
.card-title{font-size:20px;font-weight:700;margin-bottom:15px;color:#22c55e;}
input{width:100%;padding:12px;margin-top:12px;border-radius:12px;border:none;background:#111827;color:#fff;font-size:16px;box-sizing:border-box;}
button{border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:15px;transition:all .2s ease;}
button:active{transform:scale(.96);}
.btn-group{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.btn-group button{flex:1;min-width:120px;background:#ffffffeb;color:black;border-radius:8px;}
.btn-group button:hover{background:#717875;color:white;}
#uploadBtn,#addAccountBtn,#exportBtn{background:#22c55e;color:#fff;}
#deleteProcessingBtn{background:#fff7f7;color:red;}
#downloadBtn,#downloadHistoryBtn{margin-top:12px;width:100%;background:#38bdf8;color:#000;}
ul{list-style:none;padding:0;margin-top:10px;}
li{padding:6px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:8px;}
.username-highlight{padding:2px 6px;border-radius:4px;background:linear-gradient(90deg,#63e209,#0ea5e9);animation:glow 1.5s infinite alternate;}
.avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid #fff;}
.success{color:#22c55e;}
.failed{color:#f43f5e;}
@keyframes glow{0%{opacity:0.8;}100%{opacity:1;}}
.stats{margin-top:10px;font-size:14px;color:#38bdf8;}
.table-responsive{width:100%;overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1);}
th{background:#374151;color:#fff;}
#memberList,#autoAddList,#historyList{max-height:50vh;overflow-y:auto;}
.page{display:none;}
.page.active{display:block;}
@media(max-width:600px){
  .container{padding:10px;}
  .btn-group button{flex:1 1 45%;font-size:14px;padding:8px;}
  input{font-size:14px;padding:10px;}
  table,th,td{font-size:12px;}
  .avatar{width:24px;height:24px;}
}
</style>
</head>
<body>
<div class="container">

<!-- Navigation Buttons -->
<div class="btn-group">
  <button class="nav-btn" data-page="accountsPage">Accounts Status</button>
  <button class="nav-btn" data-page="membersPage">Members List & Auto-Add</button>
  <button class="nav-btn" data-page="uploadPage">Upload Accounts</button>
  <button class="nav-btn" data-page="historyPage">History</button>
</div>

<!-- Accounts Page -->
<section id="accountsPage" class="page active">
  <div class="card-title">Telegram Accounts Status</div>
  <div class="table-responsive">
    <table>
      <thead>
        <tr><th>ID</th><th>Phone</th><th>Status</th><th>FloodWait</th><th>Last Checked</th></tr>
      </thead>
      <tbody id="accountsTable"></tbody>
    </table>
  </div>
</section>

<!-- Members Page -->
<section id="membersPage" class="page">
  <div class="card-title">Members List & Auto-Add</div>
  <div style="margin-bottom:10px;">
    <input type="text" id="sourceGroupInput" placeholder="Source Telegram Group link or username">
    <input type="text" id="targetGroupInput" placeholder="Target Telegram Group link or username" style="margin-top:6px;">
    <button id="startAutoAddBtn" style="margin-top:6px;">Start Auto-Add</button>
  </div>
  <div style="margin-bottom:10px;">
    <span id="autoAddCounter">0 / 0 processed</span>
    <div style="background:#374151;border-radius:12px;height:12px;margin-top:4px;">
      <div id="autoAddProgress" style="background:#22c55e;height:12px;width:0%;border-radius:12px;"></div>
    </div>
  </div>
  <ul id="autoAddList"></ul>
</section>

<!-- Upload Accounts Page -->
<section id="uploadPage" class="page">
  <div class="card-title">Upload Telegram Accounts</div>
  <input type="text" id="phoneInput" placeholder="Phone (+855...)">
  <input type="text" id="apiIdInput" placeholder="API_ID">
  <input type="text" id="apiHashInput" placeholder="API_HASH">
  <input type="text" id="sessionInput" placeholder="Session String">
  <button id="addAccountBtn">Add Account</button>
  <div style="margin-top:12px;">
    <input type="file" id="file" accept=".txt,.env">
    <button id="uploadBtn">Upload File Accounts</button>
  </div>
  <div class="stats" id="uploadStats"></div>
</section>

<!-- History Page -->
<section id="historyPage" class="page">
  <div class="card-title">Auto-Add History</div>
  <ul id="historyList"></ul>
  <button id="downloadHistoryBtn">Download History</button>
</section>

</div>

<script>
// ===== Navigation =====
const navButtons=document.querySelectorAll(".nav-btn");
const pages=document.querySelectorAll(".page");
navButtons.forEach(btn=>{ btn.onclick=()=>{ pages.forEach(p=>p.classList.remove("active")); document.getElementById(btn.dataset.page).classList.add("active"); }; });

// ===== Accounts =====
const accountsTable=document.getElementById("accountsTable");
let accountsData={};
async function fetchAccounts(){
  try{ const res=await fetch("/account-status"); accountsData=await res.json(); renderAccounts(); }catch(e){console.log(e);}
}
function renderAccounts(){
  accountsTable.innerHTML="";
  Object.keys(accountsData).forEach(id=>{
    const acc=accountsData[id]; const tr=document.createElement("tr"); tr.id=`row-${id}`;
    let statusEmoji="🟡"; if(acc.status==="active")statusEmoji="🟢"; if(acc.status==="floodwait")statusEmoji="🔴";
    let flood="-"; if(acc.status==="floodwait" && acc.floodWaitUntil){const r=Math.max(0,Math.floor((acc.floodWaitUntil-Date.now())/1000));flood=`${Math.floor(r/60)}m ${r%60}s`;}
    let lastChecked=acc.lastChecked?new Date(acc.lastChecked).toLocaleTimeString():"-";
    tr.innerHTML=`<td>${id}</td><td>${acc.phone}</td><td>${statusEmoji} ${acc.status}</td><td class="floodwait">${flood}</td><td>${lastChecked}</td>`;
    accountsTable.appendChild(tr);
  });
}
setInterval(()=>{ Object.keys(accountsData).forEach(id=>{ const acc=accountsData[id]; if(acc.status==="floodwait" && acc.floodWaitUntil){const r=Math.max(0,Math.floor((acc.floodWaitUntil-Date.now())/1000)); const el=document.querySelector(`#row-${id} .floodwait`); if(el) el.textContent=`${Math.floor(r/60)}m ${r%60}s`; } }); },1000);
fetchAccounts(); setInterval(fetchAccounts,10000);

// ===== Upload Accounts =====
const phoneInput=document.getElementById("phoneInput"), apiIdInput=document.getElementById("apiIdInput"), apiHashInput=document.getElementById("apiHashInput"), sessionInput=document.getElementById("sessionInput"), addAccountBtn=document.getElementById("addAccountBtn"), uploadStats=document.getElementById("uploadStats");
addAccountBtn.onclick=async ()=>{const phone=phoneInput.value.trim(),api_id=apiIdInput.value.trim(),api_hash=apiHashInput.value.trim(),session=sessionInput.value.trim();if(!phone||!api_id||!api_hash||!session){alert("All fields required");return;}const res=await fetch("/add-account",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone,api_id,api_hash,session})});const data=await res.json();if(data.success){uploadStats.textContent=`Account ${phone} added successfully`;phoneInput.value="";apiIdInput.value="";apiHashInput.value="";sessionInput.value="";fetchAccounts();}else{uploadStats.textContent=`Failed: ${data.error||"Unknown"}`;}};
document.getElementById("uploadBtn").onclick=async ()=>{const file=document.getElementById("file").files[0];if(!file){alert("Select file");return;}const txt=await file.text();const res=await fetch("/upload-accounts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({accounts:txt})});const data=await res.json();if(data.success){uploadStats.textContent="File accounts uploaded";fetchAccounts();}else{uploadStats.textContent=`Failed: ${data.error||"Unknown"}`;}};

// ===== Auto-Add Members =====
const autoAddListEl=document.getElementById("autoAddList"), autoAddCounterEl=document.getElementById("autoAddCounter"), autoAddProgressEl=document.getElementById("autoAddProgress"), startAutoAddBtn=document.getElementById("startAutoAddBtn");
startAutoAddBtn.onclick=async ()=>{
  const sourceGroup=document.getElementById("sourceGroupInput").value.trim(), targetGroup=document.getElementById("targetGroupInput").value.trim();
  if(!sourceGroup||!targetGroup){alert("Enter source and target groups");return;}
  autoAddListEl.innerHTML=""; autoAddCounterEl.textContent="0 / 0"; autoAddProgressEl.style.width="0%";

  // fetch members
  const res=await fetch("/members",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({group:sourceGroup})});
  const members=await res.json(); const total=members.length;
  let processed=0;
  for(const m of members){
    try{
      const addRes=await fetch("/add-member",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:m.username,user_id:m.user_id,targetGroup})});
      const result=await addRes.json();
      const li=document.createElement("li");
      li.innerHTML=`${m.username||m.user_id} → <span class="${result.status==='success'?'success':'failed'}">${result.status}</span> via ${result.accountUsed||'-'}`;
      autoAddListEl.appendChild(li);
    }catch(err){
      const li=document.createElement("li");
      li.innerHTML=`${m.username||m.user_id} → <span class="failed">error</span> ${err.message}`;
      autoAddListEl.appendChild(li);
    }
    processed++; autoAddCounterEl.textContent=`${processed} / ${total}`; autoAddProgressEl.style.width=`${Math.floor((processed/total)*100)}%`;
    await new Promise(r=>setTimeout(r,20000));
  }
  alert("Auto-Add Completed!");
};

// ===== History =====
const historyListEl=document.getElementById("historyList");
async function fetchHistory(){
  const res=await fetch("/history");
  const data=await res.json();
  historyListEl.innerHTML="";
  Object.values(data).forEach(h=>{
    const li=document.createElement("li");
    li.innerHTML=`<span class="${h.status==='success'?'success':'failed'}">${h.username||h.user_id} → ${h.status} via ${h.accountUsed||'-'}</span>`;
    historyListEl.appendChild(li);
  });
}
document.getElementById("downloadHistoryBtn").onclick=async ()=>{
  const res=await fetch("/history");
  const data=await res.json();
  const dataStr="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(data,null,2));
  const a=document.createElement("a"); a.href=dataStr; a.download="history.json"; a.click();
};
fetchHistory(); setInterval(fetchHistory,5000);
</script>
</body>
</html>
