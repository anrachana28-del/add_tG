<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto Add PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

body{
font-family:'JetBrains Mono',monospace;
background:#0f0f10;
color:#fff;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

section{
background:#1e1e2a;
border-radius:18px;
padding:20px;
margin-bottom:20px;
}

.card-title{
font-size:22px;
color:#00ff7f;
font-weight:700;
text-align:center;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#11141f;
color:#fff;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00ff7f;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#00cc66;
color:#fff;
}

.btn-group{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.btn-group button{
flex:1;
background:#11141f;
color:#fff;
}

.btn-group button:hover{
background:#00ff7f;
color:#000;
}

.page{
display:none;
}

.page.active{
display:block;
}

.log-box{
background:#000;
height:300px;
overflow-y:auto;
padding:10px;
border-radius:10px;
font-size:13px;
}

.log-success{color:#00ff7f;}
.log-error{color:#ff4c4c;}
.log-warn{color:#ffcc00;}

.slider{
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="btn-group">

<button class="nav-btn" data-page="autoPage">Auto Add</button>
<button class="nav-btn" data-page="logsPage">Live Logs</button>
<button class="nav-btn" data-page="filterPage">Filters</button>
<button class="nav-btn" data-page="exportPage">Export</button>

</div>

<!-- AUTO ADD -->

<section id="autoPage" class="page active">

<div class="card-title">Auto Add Settings</div>

<input id="sourceGroup" placeholder="Source Group">
<input id="targetGroup" placeholder="Target Group">

<label>Speed Control (seconds per add)</label>

<input type="range" min="5" max="60" value="20" id="speedSlider" class="slider">

<div id="speedValue">20 seconds</div>

<br>

<button id="startBtn">Start Auto Add</button>
<button id="stopBtn">Stop</button>

</section>

<!-- LOGS -->

<section id="logsPage" class="page">

<div class="card-title">Live Telegram Logs</div>

<div id="logs" class="log-box"></div>

</section>

<!-- FILTERS -->

<section id="filterPage" class="page">

<div class="card-title">Member Filters</div>

<label><input type="checkbox" id="filterBots"> Skip Bots</label><br>

<label><input type="checkbox" id="filterAdmins"> Skip Admins</label><br>

<label><input type="checkbox" id="filterOffline"> Skip Offline Users</label>

</section>

<!-- EXPORT -->

<section id="exportPage" class="page">

<div class="card-title">Export</div>

<button id="exportBtn">Export Success Members</button>

</section>

</div>

<script>

/* Navigation */

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(btn.dataset.page).classList.add("active")
}
})

/* Speed Slider */

const slider=document.getElementById("speedSlider")
const speedValue=document.getElementById("speedValue")

slider.oninput=()=>{
speedValue.innerText=slider.value+" seconds"
}

/* WebSocket Logs */

const logs=document.getElementById("logs")

const ws=new WebSocket(`ws://${location.host}`)

ws.onmessage=(event)=>{

const data=JSON.parse(event.data)

const div=document.createElement("div")

div.textContent=data.message

if(data.type==="success") div.className="log-success"
if(data.type==="error") div.className="log-error"
if(data.type==="warn") div.className="log-warn"

logs.appendChild(div)

logs.scrollTop=logs.scrollHeight

}

/* Start Auto Add */

startBtn.onclick=()=>{

fetch("/start-auto-add",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

source:sourceGroup.value,

target:targetGroup.value,

speed:slider.value,

filters:{
bots:filterBots.checked,
admins:filterAdmins.checked,
offline:filterOffline.checked
}

})

})

}

/* Stop */

stopBtn.onclick=()=>{

fetch("/stop-auto-add",{method:"POST"})

}

/* Export */

exportBtn.onclick=async()=>{

const res=await fetch("/export-success")

const blob=await res.blob()

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="success_members.json"

a.click()

}

</script>

</body>
</html>
