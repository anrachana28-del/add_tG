<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Export & Auto-Add PRO+++</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

body{
font-family:'JetBrains Mono',monospace;
background:#121213;
color:#fff;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

section{
background:#1f2937;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.card-title{
font-size:20px;
font-weight:700;
margin-bottom:15px;
color:#22c55e;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#111827;
color:#fff;
font-size:15px;
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.btn-group{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:15px;
}

.btn-group button{
flex:1;
background:#fff;
color:#000;
}

.btn-group button:hover{
background:#22c55e;
color:#fff;
}

.success{color:#22c55e;}
.failed{color:#f43f5e;}

.avatar{
width:28px;
height:28px;
border-radius:50%;
margin-right:6px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
align-items:center;
}

.table-responsive{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#374151;
}

.page{display:none;}
.page.active{display:block;}

.progress-bar{
background:#374151;
height:12px;
border-radius:10px;
margin-top:6px;
}

.progress{
background:#22c55e;
height:12px;
width:0%;
border-radius:10px;
}

.spinner{
display:none;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="btn-group">
<button class="nav-btn" data-page="accountsPage">Accounts</button>
<button class="nav-btn" data-page="membersPage">Auto Add</button>
<button class="nav-btn" data-page="uploadPage">Upload</button>
<button class="nav-btn" data-page="historyPage">History</button>
</div>

<!-- ACCOUNTS -->

<section id="accountsPage" class="page active">

<div class="card-title">Accounts Status</div>

<div class="table-responsive">
<table>
<thead>
<tr>
<th>ID</th>
<th>Phone</th>
<th>Status</th>
<th>FloodWait</th>
</tr>
</thead>
<tbody id="accountsTable"></tbody>
</table>
</div>

</section>

<!-- MEMBERS -->

<section id="membersPage" class="page">

<div class="card-title">Auto Add Members</div>

<input id="sourceGroupInput" placeholder="Source Group">
<input id="targetGroupInput" placeholder="Target Group">

<button id="startAutoAddBtn">Start Auto-Add</button>

<div id="loading" class="spinner">⏳ Loading Members...</div>

<div id="autoAddCounter">0 / 0</div>

<div class="progress-bar">
<div id="autoAddProgress" class="progress"></div>
</div>

<ul id="autoAddList"></ul>

</section>

<!-- UPLOAD -->

<section id="uploadPage" class="page">

<div class="card-title">Upload Accounts</div>

<input id="phoneInput" placeholder="Phone +855">
<input id="apiIdInput" placeholder="API ID">
<input id="apiHashInput" placeholder="API HASH">
<input id="sessionInput" placeholder="Session String">

<button id="addAccountBtn">Add Account</button>

<br><br>

<input type="file" id="file" accept=".txt">
<button id="uploadBtn">Upload File</button>

<div id="uploadStats"></div>

</section>

<!-- HISTORY -->

<section id="historyPage" class="page">

<div class="card-title">History</div>

<ul id="historyList"></ul>

<button id="downloadHistoryBtn">Download History</button>

</section>

</div>

<script>

// navigation

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(btn.dataset.page).classList.add("active")
}
})


// accounts

const accountsTable=document.getElementById("accountsTable")

async function fetchAccounts(){

try{

const res=await fetch("/account-status")

if(!res.ok) return

const data=await res.json()

accountsTable.innerHTML=""

Object.keys(data).forEach(id=>{

const acc=data[id]

let flood="-"

if(acc.floodWaitUntil){

let r=Math.floor((acc.floodWaitUntil-Date.now())/1000)

if(r>0){

flood=Math.floor(r/60)+"m "+(r%60)+"s"

}

}

accountsTable.innerHTML+=`
<tr>
<td>${id}</td>
<td>${acc.phone}</td>
<td>${acc.status}</td>
<td>${flood}</td>
</tr>
`

})

}catch(e){console.log(e)}

}

setInterval(fetchAccounts,8000)

fetchAccounts()


// add account

document.getElementById("addAccountBtn").onclick=async()=>{

const phone=phoneInput.value.trim()
const api_id=apiIdInput.value.trim()
const api_hash=apiHashInput.value.trim()
const session=sessionInput.value.trim()

if(!phone||!api_id||!api_hash||!session){

alert("All fields required")
return

}

const res=await fetch("/add-account",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({phone,api_id,api_hash,session})

})

const data=await res.json()

uploadStats.innerText=data.success?"Added":"Failed"

}


// upload file

uploadBtn.onclick=async()=>{

const file=document.getElementById("file").files[0]

if(!file)return alert("select file")

const txt=await file.text()

const res=await fetch("/upload-accounts",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({accounts:txt})

})

const data=await res.json()

uploadStats.innerText=data.success?"Uploaded":"Failed"

}


// auto add

const autoAddList=document.getElementById("autoAddList")
const counter=document.getElementById("autoAddCounter")
const progress=document.getElementById("autoAddProgress")

startAutoAddBtn.onclick=async()=>{

const source=sourceGroupInput.value.trim()
const target=targetGroupInput.value.trim()

if(!source||!target)return alert("enter groups")

loading.style.display="block"

const res=await fetch("/members",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({group:source})

})

const members=await res.json()

loading.style.display="none"

let processed=0

for(const m of members){

const addRes=await fetch("/add-member",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:m.username,
user_id:m.user_id,
targetGroup:target
})

})

const result=await addRes.json()

const li=document.createElement("li")

li.innerHTML=`
<img class="avatar" src="https://i.imgur.com/3GvwNBf.png">
${m.username||m.user_id}
→
<span class="${result.status==="success"?"success":"failed"}">
${result.status}
</span>
`

autoAddList.appendChild(li)

processed++

counter.innerText=processed+" / "+members.length

progress.style.width=Math.floor((processed/members.length)*100)+"%"

await new Promise(r=>setTimeout(r,20000))

}

alert("Auto Add Finished")

}


// history

async function fetchHistory(){

const res=await fetch("/history")

const data=await res.json()

historyList.innerHTML=""

Object.values(data).forEach(h=>{

historyList.innerHTML+=`
<li class="${h.status==="success"?"success":"failed"}">
${h.username||h.user_id} → ${h.status}
</li>
`

})

}

setInterval(fetchHistory,6000)

fetchHistory()


// download history

downloadHistoryBtn.onclick=async()=>{

const res=await fetch("/history")

const data=await res.json()

const blob=new Blob([JSON.stringify(data,null,2)])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="history.json"

a.click()

}

</script>

</body>
</html>
