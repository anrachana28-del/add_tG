<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO+++</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'JetBrains Mono',monospace;
background:#0f0f10;
color:white;
margin:0;
padding:0
}

.container{
max-width:900px;
margin:auto;
padding:15px
}

section{
background:#1e1e2a;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.6)
}

.card-title{
font-size:22px;
font-weight:700;
margin-bottom:15px;
color:#00ff7f;
text-align:center
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
background:#11141f;
color:#fff;
font-size:15px
}

button{
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:600;
background:#00ff7f;
color:#000
}

button:hover{
background:#00cc66;
color:white
}

.btn-group{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:15px
}

.btn-group button{
flex:1;
background:#11141f;
color:#fff
}

.btn-group button:hover{
background:#00ff7f;
color:#000
}

.page{display:none}
.page.active{display:block}

.success{color:#00ff7f;font-weight:700}
.failed{color:#ff4c4c;font-weight:700}
.already{color:#ffcc00;font-weight:700}

ul{
list-style:none;
padding:0;
max-height:400px;
overflow:auto
}

li{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.05)
}

.avatar{
width:28px;
height:28px;
border-radius:50%;
margin-right:8px
}

.progress-bar{
background:#11141f;
height:14px;
border-radius:10px;
margin-top:10px
}

.progress{
background:#00ff7f;
height:14px;
width:0%;
border-radius:10px
}

.countdown{font-weight:700}
.green{color:#00ff7f}
.yellow{color:#ffcc00}
.red{color:#ff4c4c}

table{
width:100%;
border-collapse:collapse
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1)
}

th{
background:#11141f;
color:#00ff7f
}

</style>
</head>

<body>

<div class="container">

<div class="btn-group">

<button class="nav-btn" data-page="accountsPage">Accounts</button>
<button class="nav-btn" data-page="membersPage">Auto Add</button>
<button class="nav-btn" data-page="uploadPage">Upload</button>
<button class="nav-btn" data-page="historyPage">History</button>

</div>


<!-- ACCOUNTS -->

<section id="accountsPage" class="page active">

<div class="card-title">Accounts Status</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Phone</th>
<th>Status</th>
<th>FloodWait</th>
</tr>

</thead>

<tbody id="accountsTable"></tbody>

</table>

</section>



<!-- AUTO ADD -->

<section id="membersPage" class="page">

<div class="card-title">Auto Add Members</div>

<input id="sourceGroupInput" placeholder="Source Group">

<input id="targetGroupInput" placeholder="Target Group">

<button id="startAutoAddBtn">Start Auto Add</button>

<div id="autoAddStatus"></div>

<div id="autoAddCounter">0 / 0</div>

<div class="progress-bar">
<div id="autoAddProgress" class="progress"></div>
</div>

<ul id="autoAddList"></ul>

</section>



<!-- UPLOAD -->

<section id="uploadPage" class="page">

<div class="card-title">Upload Accounts</div>

<input id="phoneInput" placeholder="Phone">

<input id="apiIdInput" placeholder="API ID">

<input id="apiHashInput" placeholder="API HASH">

<input id="sessionInput" placeholder="Session String">

<button id="addAccountBtn">Add Account</button>

<br><br>

<input type="file" id="file">

<button id="uploadBtn">Upload File</button>

<div id="uploadStats"></div>

</section>



<!-- HISTORY -->

<section id="historyPage" class="page">

<div class="card-title">History</div>

<ul id="historyList"></ul>

<button id="downloadHistoryBtn">Download History</button>

</section>

</div>


<script>

/* NAVIGATION */

document.querySelectorAll(".nav-btn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(btn.dataset.page).classList.add("active")

}

})



/* ACCOUNTS STATUS */

const accountsTable=document.getElementById("accountsTable")

async function fetchAccounts(){

const res=await fetch("/account-status")

const data=await res.json()

accountsTable.innerHTML=""

const now=Date.now()

Object.keys(data).forEach(id=>{

const acc=data[id]

let flood="-"

if(acc.floodWaitUntil && acc.floodWaitUntil>now){

let sec=Math.floor((acc.floodWaitUntil-now)/1000)

let m=Math.floor(sec/60)

let s=sec%60

flood=`${m}m ${s}s`

}

accountsTable.innerHTML+=`

<tr>

<td>${id}</td>

<td>${acc.phone}</td>

<td>${acc.status}</td>

<td class="countdown red">${flood}</td>

</tr>

`

})

}

setInterval(fetchAccounts,2000)

fetchAccounts()



/* AUTO ADD */

const list=document.getElementById("autoAddList")

const counter=document.getElementById("autoAddCounter")

const progress=document.getElementById("autoAddProgress")

const status=document.getElementById("autoAddStatus")

startAutoAddBtn.onclick=async()=>{

const source=sourceGroupInput.value.trim()

const target=targetGroupInput.value.trim()

if(!source||!target)return alert("Enter groups")

status.innerText="Fetching members..."

const res=await fetch("/members",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({group:source})

})

const members=await res.json()

list.innerHTML=""

counter.innerText=`0 / ${members.length}`

let processed=0

for(const m of members){

status.innerText=`Processing ${processed+1} / ${members.length}`

const addRes=await fetch("/add-member",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

username:m.username,

user_id:m.user_id,

targetGroup:target

})

})

const result=await addRes.json()

let delayText=""

if(result.status==="success" && result.delay){

let sec=Math.floor(result.delay/1000)

delayText=`Delay ${sec}s`

}

if(result.status==="already_member") delayText="Already in group"

if(result.status==="failed") delayText=result.reason

list.innerHTML+=`

<li>

<img class="avatar" src="${m.avatar}">

${m.username||m.user_id}

→ <span class="${result.status==="success"?"success":result.status==="already_member"?"already":"failed"}">

${result.status}

</span>

by ${result.accountUsed}

<br>

${delayText}

</li>

`

processed++

counter.innerText=`${processed} / ${members.length}`

progress.style.width=`${(processed/members.length)*100}%`

if(result.delay) await new Promise(r=>setTimeout(r,result.delay))

}

status.innerText="Auto Add Finished"

}



/* HISTORY */

const historyList=document.getElementById("historyList")

async function fetchHistory(){

const res=await fetch("/history")

const data=await res.json()

historyList.innerHTML=""

Object.values(data).forEach(h=>{

historyList.innerHTML+=`

<li>

${h.username||h.user_id}

→ ${h.status}

by ${h.accountUsed}

</li>

`

})

}

setInterval(fetchHistory,5000)

fetchHistory()

</script>

</body>
</html>
