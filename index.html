<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Export Tool PRO</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
font-size:20px;
font-weight:bold;
}

nav{
display:flex;
gap:10px;
padding:10px;
background:#111827;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.nav-btn{
background:#1f2937;
color:white;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

input{
padding:10px;
width:100%;
margin-bottom:10px;
border-radius:6px;
border:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #334155;
padding:8px;
text-align:left;
}

.success{color:#22c55e}
.failed{color:#ef4444}

.progress{
height:8px;
background:#1e293b;
border-radius:5px;
margin-top:10px;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
}

</style>

</head>

<body>

<header>Telegram Automation Panel</header>

<nav>
<button class="nav-btn" data-page="accounts">Accounts</button>
<button class="nav-btn" data-page="autoadd">Auto Add</button>
<button class="nav-btn" data-page="history">History</button>
</nav>

<!-- ACCOUNTS PAGE -->
<div id="accounts" class="page active">

<h3>Add Account</h3>

<input id="phoneInput" placeholder="Phone">
<input id="apiIdInput" placeholder="API ID">
<input id="apiHashInput" placeholder="API HASH">
<input id="sessionInput" placeholder="String Session">

<button id="addAccountBtn">Add Account</button>

<h3>Accounts Status</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Phone</th>
<th>Status</th>
<th>FloodWait</th>
</tr>
</thead>

<tbody id="accountsTable"></tbody>
</table>

</div>


<!-- AUTO ADD PAGE -->

<div id="autoadd" class="page">

<h3>Auto Add Members</h3>

<input id="sourceGroupInput" placeholder="Source Group Link">
<input id="targetGroupInput" placeholder="Target Group Link">

<button id="startAutoAddBtn">Start Auto Add</button>

<div id="loading" style="display:none">Loading members...</div>

<div class="progress">
<div id="autoAddProgress" class="progress-bar"></div>
</div>

<div id="autoAddCounter"></div>

<ul id="autoAddList"></ul>

</div>


<!-- HISTORY -->

<div id="history" class="page">

<h3>History</h3>

<button id="downloadHistoryBtn">Download JSON</button>

<ul id="historyList"></ul>

</div>



<script>

const API_BASE="https://add-tg-2.onrender.com"


// Navigation

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(btn.dataset.page).classList.add("active")
}
})


// Fetch Accounts

async function fetchAccounts(){

try{

const res=await fetch(API_BASE+"/account-status")

if(!res.ok)return

const data=await res.json()

accountsTable.innerHTML=""

Object.keys(data).forEach(id=>{

const acc=data[id]

let flood="-"

if(acc.floodWaitUntil){

let r=Math.floor((acc.floodWaitUntil-Date.now())/1000)

if(r>0){
flood=Math.floor(r/60)+"m "+(r%60)+"s"
}

}

accountsTable.innerHTML+=`
<tr>
<td>${id}</td>
<td>${acc.phone}</td>
<td>${acc.status}</td>
<td>${flood}</td>
</tr>
`

})

}catch(e){

console.log("Account error",e)

}

}

setInterval(fetchAccounts,8000)
fetchAccounts()



// Add Account

addAccountBtn.onclick=async()=>{

const phone=phoneInput.value.trim()
const api_id=apiIdInput.value.trim()
const api_hash=apiHashInput.value.trim()
const session=sessionInput.value.trim()

if(!phone||!api_id||!api_hash||!session){

alert("Fill all fields")
return

}

try{

const res=await fetch(API_BASE+"/add-account",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({phone,api_id,api_hash,session})

})

const text=await res.text()

let data

try{
data=JSON.parse(text)
}catch{
alert("Server returned HTML / Error")
return
}

alert(data.success?"Account Added":"Failed")

fetchAccounts()

}catch(e){

alert("Network error")

}

}



// AUTO ADD MEMBERS

startAutoAddBtn.onclick=async()=>{

const source=sourceGroupInput.value.trim()
const target=targetGroupInput.value.trim()

if(!source||!target){
alert("Enter groups")
return
}

loading.style.display="block"

try{

const res=await fetch(API_BASE+"/members",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({group:source})

})

const members=await res.json()

loading.style.display="none"

let processed=0

for(const m of members){

const addRes=await fetch(API_BASE+"/add-member",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:m.username,
user_id:m.user_id,
targetGroup:target
})

})

const result=await addRes.json()

const li=document.createElement("li")

li.innerHTML=`
${m.username||m.user_id}
→
<span class="${result.status==="success"?"success":"failed"}">
${result.status}
</span>
`

autoAddList.appendChild(li)

processed++

autoAddCounter.innerText=processed+" / "+members.length

autoAddProgress.style.width=Math.floor((processed/members.length)*100)+"%"

await new Promise(r=>setTimeout(r,20000))

}

alert("Finished")

}catch(e){

loading.style.display="none"

}

}



// HISTORY

async function fetchHistory(){

try{

const res=await fetch(API_BASE+"/history")

if(!res.ok)return

const data=await res.json()

historyList.innerHTML=""

Object.values(data).forEach(h=>{

historyList.innerHTML+=`
<li class="${h.status==="success"?"success":"failed"}">
${h.username||h.user_id} → ${h.status}
</li>
`

})

}catch(e){}

}

setInterval(fetchHistory,5000)
fetchHistory()



// DOWNLOAD HISTORY

downloadHistoryBtn.onclick=async()=>{

const res=await fetch(API_BASE+"/history")

const data=await res.json()

const blob=new Blob([JSON.stringify(data,null,2)])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="history.json"

a.click()

}

</script>

</body>
</html>
