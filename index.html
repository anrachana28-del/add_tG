<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Telegram Auto Add PRO</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
background:#0f172a;
color:#fff;
font-family:'JetBrains Mono',monospace;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:15px;
color:#22c55e;
}

.nav{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:15px;
}

.nav button{
padding:10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:13px;
}

.nav button:hover{
background:#22c55e;
}

.card{
background:#1e293b;
border-radius:14px;
padding:16px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.card-title{
font-size:18px;
margin-bottom:12px;
color:#22c55e;
}

input{
width:100%;
padding:11px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#111827;
color:white;
}

button.primary{
background:#22c55e;
color:#fff;
width:100%;
padding:11px;
border:none;
border-radius:8px;
}

button.primary:hover{
background:#16a34a;
}

.table-responsive{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#374151;
}

.page{display:none}
.page.active{display:block}

.success{color:#22c55e}
.failed{color:#f43f5e}

ul{
list-style:none;
padding:0;
max-height:300px;
overflow:auto;
}

li{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
align-items:center;
}

.avatar{
width:26px;
height:26px;
border-radius:50%;
margin-right:6px;
}

.progress-bar{
height:12px;
background:#111827;
border-radius:8px;
margin-top:6px;
}

.progress{
height:12px;
background:#22c55e;
width:0%;
border-radius:8px;
}

.spinner{
display:none;
text-align:center;
padding:10px;
}

@media(max-width:600px){

header{
font-size:18px;
}

.nav button{
font-size:11px;
padding:8px;
}

}

</style>

</head>

<body>

<div class="container">

<header>🚀 Telegram Auto Add PRO</header>

<div class="nav">
<button class="nav-btn" data-page="accountsPage">Accounts</button>
<button class="nav-btn" data-page="addPage">Auto Add</button>
<button class="nav-btn" data-page="uploadPage">Upload</button>
<button class="nav-btn" data-page="historyPage">History</button>
</div>


<!-- ACCOUNTS -->

<div id="accountsPage" class="page active">

<div class="card">

<div class="card-title">Accounts Status</div>

<div class="table-responsive">

<table>

<thead>

<tr>
<th>ID</th>
<th>Phone</th>
<th>Status</th>
<th>Flood</th>
</tr>

</thead>

<tbody id="accountsTable"></tbody>

</table>

</div>

</div>

</div>


<!-- AUTO ADD -->

<div id="addPage" class="page">

<div class="card">

<div class="card-title">Auto Add Members</div>

<input id="sourceGroupInput" placeholder="Source Group">

<input id="targetGroupInput" placeholder="Target Group">

<button class="primary" id="startAutoAddBtn">Start Auto Add</button>

<div id="loading" class="spinner">⏳ Loading Members...</div>

<div id="autoAddCounter">0 / 0</div>

<div class="progress-bar">
<div id="autoAddProgress" class="progress"></div>
</div>

<ul id="autoAddList"></ul>

</div>

</div>


<!-- UPLOAD -->

<div id="uploadPage" class="page">

<div class="card">

<div class="card-title">Add Account</div>

<input id="phoneInput" placeholder="Phone">

<input id="apiIdInput" placeholder="API ID">

<input id="apiHashInput" placeholder="API HASH">

<input id="sessionInput" placeholder="Session String">

<button class="primary" id="addAccountBtn">Add Account</button>

</div>

<div class="card">

<div class="card-title">Upload Accounts File</div>

<input type="file" id="file">

<button class="primary" id="uploadBtn">Upload File</button>

<div id="uploadStats"></div>

</div>

</div>


<!-- HISTORY -->

<div id="historyPage" class="page">

<div class="card">

<div class="card-title">History</div>

<ul id="historyList"></ul>

<button class="primary" id="downloadHistoryBtn">Download History</button>

</div>

</div>

</div>


<script>

const API_BASE="https://add-tg-2.onrender.com"


// navigation

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(btn.dataset.page).classList.add("active")
}
})


// accounts

async function fetchAccounts(){

try{

const res=await fetch(API_BASE+"/account-status")

const data=await res.json()

accountsTable.innerHTML=""

Object.keys(data).forEach(id=>{

const acc=data[id]

accountsTable.innerHTML+=`
<tr>
<td>${id}</td>
<td>${acc.phone}</td>
<td>${acc.status}</td>
<td>${acc.floodWaitUntil||"-"}</td>
</tr>
`

})

}catch(e){}

}

setInterval(fetchAccounts,8000)
fetchAccounts()


// add account

addAccountBtn.onclick=async()=>{

const phone=phoneInput.value
const api_id=apiIdInput.value
const api_hash=apiHashInput.value
const session=sessionInput.value

const res=await fetch(API_BASE+"/add-account",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({phone,api_id,api_hash,session})

})

const data=await res.json()

uploadStats.innerText=data.success?"Account Added":"Failed"

}


// upload file

uploadBtn.onclick=async()=>{

const file=document.getElementById("file").files[0]

if(!file) return alert("Select file")

const txt=await file.text()

const res=await fetch(API_BASE+"/upload-accounts",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({accounts:txt})

})

const data=await res.json()

uploadStats.innerText=data.success?"Uploaded":"Failed"

}


// auto add

startAutoAddBtn.onclick=async()=>{

const source=sourceGroupInput.value
const target=targetGroupInput.value

if(!source||!target) return alert("Enter groups")

loading.style.display="block"

const res=await fetch(API_BASE+"/members",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({group:source})

})

const members=await res.json()

loading.style.display="none"

let processed=0

for(const m of members){

const addRes=await fetch(API_BASE+"/add-member",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:m.username,
user_id:m.user_id,
targetGroup:target
})

})

const result=await addRes.json()

const li=document.createElement("li")

li.innerHTML=`
<img class="avatar" src="https://i.imgur.com/3GvwNBf.png">
${m.username||m.user_id}
→
<span class="${result.status==="success"?"success":"failed"}">
${result.status}
</span>
`

autoAddList.appendChild(li)

processed++

autoAddCounter.innerText=processed+" / "+members.length

autoAddProgress.style.width=Math.floor((processed/members.length)*100)+"%"

await new Promise(r=>setTimeout(r,20000))

}

}


// history

async function fetchHistory(){

const res=await fetch(API_BASE+"/history")

const data=await res.json()

historyList.innerHTML=""

Object.values(data).forEach(h=>{

historyList.innerHTML+=`
<li class="${h.status==="success"?"success":"failed"}">
${h.username||h.user_id} → ${h.status}
</li>
`

})

}

setInterval(fetchHistory,6000)
fetchHistory()

</script>

</body>
</html>
