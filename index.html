<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Export Tool PRO+++ Mobile Safe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
body {font-family:'JetBrains Mono',monospace;background:#121213;color:#fff;margin:0;padding:0;}
.container{max-width:900px;margin:auto;padding:20px;}
section{background:#1f2937;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.5);}
.card-title{font-size:20px;font-weight:700;margin-bottom:15px;color:#22c55e;}
input, select{width:100%;padding:12px;margin-top:12px;border-radius:12px;border:none;background:#111827;color:#fff;font-size:16px;box-sizing:border-box;}
button{border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:15px;transition:all .2s ease;box-sizing:border-box;}
button:active{transform:scale(.96);}
.btn-group{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.btn-group button{flex:1;min-width:100px;}
.nav-btn{background:#ffffffeb;color:black;}
.nav-btn:hover{background:#717875;}
#logoutBtn{background:#c67474;}
#logoutBtn:hover{background:#dc2626;}
#uploadBtn,#exportBtn{background:#22c55e;color:#fff;}
#deleteProcessingBtn{background:#fff7f7;color: rgb(249, 5, 5);}
#deleteProcessingBtn:hover{background:#ed0909; color: white;}
#downloadBtn,#downloadHistoryBtn{margin-top:12px;width:100%;color:#000;}
ul{list-style:none;padding:0;margin-top:10px;word-break:break-word;}
li{padding:6px;border-bottom:1px solid rgba(255,255,255,0.05);border-radius:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.username-highlight{display:inline-block;padding:2px 6px;border-radius:4px;background: linear-gradient(90deg,#63e209,#0ea5e9);animation: glow 1.5s ease-in-out infinite alternate;}
.avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid #fff;}
.stats{margin-top:10px;font-size:14px;color:#38bdf8;}
.table-responsive{width:100%;overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1);}
th{background:#374151;color:#fff;}
#memberList{max-height:50vh;overflow-y:auto;padding-right:4px;}
#loadingOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;display:none;z-index:9999;}
@keyframes glow{0%{background-position:0%;}50%{background-position:100%;}100%{background-position:0%;}}
@media(max-width:600px){
  .container{padding:15px;}
  .btn-group button{flex:1 1 45%;font-size:14px;padding:10px;}
  input{font-size:14px;padding:10px;}
  table, th, td{font-size:12px;}
  ul#memberList{max-height:40vh;}
  .username-highlight{padding:1px 4px;font-size:12px;}
  .avatar{width:24px;height:24px;}
}
</style>
</head>
<body>
<div id="loadingOverlay">Exporting Members... <span id="progressCount">0</span>/<span id="totalCount">0</span></div>

<div class="container">
  <section id="accountsPage">
    <div class="card-title">Accounts Status</div>
    <div class="table-responsive">
      <table id="accountsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Phone</th>
            <th>Status</th>
            <th>FloodWait</th>
            <th>Last Checked</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section id="membersPage">
    <div class="card-title">Export Members</div>
    <input type="text" id="groupInput" placeholder="Enter Group Link or Username">
    <button id="exportBtn">Export Members</button>
    <div class="table-responsive" style="margin-top:10px;">
      <table id="membersTable">
        <thead>
          <tr>
            <th>Username</th>
            <th>User ID</th>
            <th>Avatar</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</div>

<script>
async function fetchAccounts(){
  const res = await fetch('/account-status');
  const data = await res.json();
  const tbody = document.querySelector('#accountsTable tbody');
  tbody.innerHTML = '';
  const now = Date.now();
  for(const id in data){
    const acc = data[id];
    const tr = document.createElement('tr');
    const floodWaitSec = acc.floodWaitUntil ? Math.max(0,Math.floor((acc.floodWaitUntil-now)/1000)) : 0;
    const statusEmoji = acc.status==='active'?'🟢': acc.status==='floodwait'?'🔴':'🟡';
    tr.innerHTML = `
      <td>${id}</td>
      <td>${acc.phone}</td>
      <td>${statusEmoji} ${acc.status}</td>
      <td>${acc.status==='floodwait'?formatTime(floodWaitSec):'-'}</td>
      <td>${acc.lastChecked?new Date(acc.lastChecked).toLocaleTimeString():'-'}</td>
    `;
    tbody.appendChild(tr);
  }
}
function formatTime(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return `${m}m ${s}s`;
}
setInterval(fetchAccounts,1000);
fetchAccounts();

// ===== Export Members with Loading =====
const exportBtn = document.getElementById('exportBtn');
const groupInput = document.getElementById('groupInput');
exportBtn.addEventListener('click',async()=>{
  const group = groupInput.value.trim();
  if(!group) return alert('Enter Group link or username!');
  const overlay = document.getElementById('loadingOverlay');
  const progress = document.getElementById('progressCount');
  const total = document.getElementById('totalCount');
  overlay.style.display='flex';
  const tbody = document.querySelector('#membersTable tbody');
  tbody.innerHTML='';
  try{
    const res = await fetch('/members',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group})});
    const members = await res.json();
    total.textContent = members.length;
    for(let i=0;i<members.length;i++){
      const m = members[i];
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>@${m.username||'-'}</td><td>${m.user_id}</td><td>${m.avatar?`<img class="avatar" src="${m.avatar}">`:'-'}</td>`;
      tbody.appendChild(tr);
      progress.textContent = i+1;
      await new Promise(r=>setTimeout(r,50)); // small delay to show progress
    }
  }catch(err){ alert(err.message); }
  overlay.style.display='none';
});
</script>
</body>
</html>
